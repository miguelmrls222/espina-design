<!doctype html>

    <title>Espina Design — Cuero Hecho a Mano</title>

        <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
          <a href="/" class="font-heading text-xl tracking-wider uppercase">Espina Design</a>
          <nav class="hidden md:flex items-center gap-8 text-sm tracking-wide">
            <a href="/" class="hover:text-gray-600 transition-colors">Inicio</a>
            <a href="/tienda" class="hover:text-gray-600 transition-colors">Tienda</a>
            <a href="/nosotros" class="hover:text-gray-600 transition-colors">Nosotros</a>
            <a href="/contacto" class="hover:text-gray-600 transition-colors">Contacto</a>
          </nav>
          <button id="menu-btn" class="md:hidden flex flex-col gap-1.5 p-2" aria-label="Menú">

            <span class="block w-6 h-px bg-black"></span>
            <span class="block w-6 h-px bg-black"></span>

      <main>
        <section class="min-h-screen flex flex-col items-center justify-center px-6 text-center">
          <h1 class="font-heading text-5xl md:text-7xl lg:text-8xl tracking-wider uppercase mb-6">
            Espina<br />Design
          </h1>
          <p class="font-body text-base md:text-lg text-gray-600 max-w-md mb-10 leading-relaxed">

          </p>
          <a href="/tienda" class="font-heading text-sm tracking-widest uppercase border-2 border-black px-10 py-3 hover:bg-black hover:text-white transition-colors duration-300">
            Ver Colección
          </a>
        </section>
      </main>

      <footer class="border-t border-gray-100 py-10 px-6">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4 text-sm text-gray-500">
          <p class="font-heading tracking-wider uppercase text-xs">Espina Design © 2026</p>
          <p class="text-xs">Cuero hecho a mano — México</p>
        </div>
      </footer>

    <script type="module" src="/src/main.js"></script>
